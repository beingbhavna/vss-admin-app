<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar" *ngIf="showLayout">
    <div class="logo">⚡ VSS CRM</div>

    <nav>
      <a routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      <a routerLink="/leads" routerLinkActive="active">Leads</a>
      <a routerLink="/calendar" routerLinkActive="active">Calendar</a>
      <a routerLink="/calls" routerLinkActive="active">Calls</a>
      <a routerLink="/users" routerLinkActive="active">Users</a>
    </nav>
  </aside>

  <!-- MAIN -->
  <div class="main" [class.expanded]="!showLayout">

    <!-- TOPBAR -->
    <header class="topbar" *ngIf="showLayout">
      <input type="text" placeholder="Search leads..." aria-label="Search leads" />

      <div class="user">
        <span>Admin</span>
        <button (click)="logout()">Logout</button>
      </div>
    </header>

    <!-- CONTENT -->
    <div class="content">
      <router-outlet></router-outlet>
    </div>

  </div>
</div>
