<h2>Schedule</h2>

<!-- <mwl-calendar-month-view [viewDate]="viewDate"></mwl-calendar-month-view> -->

<div class="calendar">
  <div *ngFor="let day of days" class="day">
    {{day}}
  </div>
</div>

<h2>📅 Appointment Calendar</h2>

<mwl-calendar-month-view
  [viewDate]="viewDate"
  [events]="events"
  (dayClicked)="addBooking($event.day.date)">
</mwl-calendar-month-view>
