<div class="login-page">
  <div class="login-card">
    <h2>Welcome Back</h2>
    <p>Sign in to continue to VSS CRM.</p>

    <form #loginForm="ngForm" (ngSubmit)="login()" class="login-form" novalidate>
      <label>
        Email
        <input
          type="email"
          name="email"
          [(ngModel)]="email"
          required
          #emailRef="ngModel"
          placeholder="you@example.com"
          autocomplete="email"
        />
      </label>
      <div class="field-error" *ngIf="emailRef.invalid && emailRef.touched">
        Please enter a valid email.
      </div>

      <label>
        Password
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          required
          minlength="6"
          #pwdRef="ngModel"
          placeholder="Min 6 characters"
          autocomplete="current-password"
        />
      </label>
      <div class="field-error" *ngIf="pwdRef.invalid && pwdRef.touched">
        Password must be at least 6 characters.
      </div>

      <button type="submit" [disabled]="loginForm.invalid || isLoading">
        {{ isLoading ? 'Signing in...' : 'Login' }}
      </button>
    </form>

    <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>
  </div>
</div>
