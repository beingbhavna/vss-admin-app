<h2>Leads</h2>

<div class="filters">
  <input placeholder="Search..." [(ngModel)]="search">
  <select [(ngModel)]="status">
    <option value="">All</option>
    <option>New</option>
    <option>Contacted</option>
    <option>Closed</option>
  </select>
</div>

<table class="table">
<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Service</th>
<th>Status</th>
<th>Actions</th>
<th>Chat</th>
</tr>
</thead>
<tbody>
<tr *ngFor="let l of filteredLeads()">
<td>{{l.name}}</td>
<td>{{l.phone}}</td>
<td>{{l.service}}</td>
<td>
<select [(ngModel)]="l.status" (change)="update(l)">
<option>New</option>
<option>Contacted</option>
<option>Closed</option>
</select>
</td>
<td>
<button (click)="logCall(l)">📞 Log Call</button>
</td>
<td>
<a [href]="'https://wa.me/91'+l.phone" target="_blank">💬 WhatsApp</a>
</td>
</tr>
<tr *ngIf="filteredLeads().length === 0">
<td colspan="6" class="empty">No leads found. Adjust search or status filter.</td>
</tr>
</tbody>
</table>
